# =============================================================================
# VOICE ASSISTANT - disabled startup-safe fallback
# =============================================================================
# The external audio stack used by voice_assistant.yaml currently crashes this
# device during startup. Keep the rest of the display usable while voice is
# rebuilt on a stable component.
# =============================================================================

script:
  - id: open_device_volume_control
    mode: restart
    then:
      - logger.log:
          level: WARN
          tag: voice
          format: "Voice services are disabled in this firmware because the current audio stack crashes during startup"

switch:
  - platform: template
    id: voice_services_enabled
    name: "${entity_voice_services}"
    icon: mdi:account-voice
    entity_category: config
    restore_mode: ALWAYS_OFF
    optimistic: true
    web_server:
      sorting_group_id: sg_display
    turn_on_action:
      - logger.log:
          level: WARN
          tag: voice
          format: "Voice services are temporarily disabled on ESP32-P4-86 firmware"
      - switch.turn_off: voice_services_enabled
    turn_off_action:
      - script.execute: clock_bar_apply
