# =============================================================================
# BLUETOOTH PROXY DISABLED - Placeholder for firmware without BLE support
# =============================================================================
# Used by firmware variants that intentionally leave Bluetooth hardware off.
# The switch remains off so the web UI can show the setting without enabling
# unsupported BLE components.
# =============================================================================

switch:
  - platform: template
    name: "Bluetooth Proxy"
    id: bluetooth_proxy_enabled
    internal: true
    lambda: 'return false;'
    entity_category: config
    icon: "mdi:bluetooth-off"
    web_server:
      sorting_group_id: sg_connectivity
    turn_on_action:
      - logger.log: "Bluetooth proxy is not available in this firmware variant."
    turn_off_action:
      - logger.log: "Bluetooth proxy is not available in this firmware variant."
